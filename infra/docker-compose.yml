services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      # Inside the compose network Redis is reachable by service name, not localhost.
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        # Vite bakes these into the bundle at build time; set them in the shell
        # (or an .env next to this file) before `docker compose build`.
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
        VITE_API_AUTH_TOKEN: ${API_AUTH_TOKEN:-}
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend

  # Placeholder container: app/worker.py prints and exits until the Redis/RQ
  # queue consumer is implemented. Workflows currently run inside the backend
  # process via FastAPI background tasks.
  worker:
    build:
      context: ../backend
      dockerfile: Dockerfile
    command: ["python", "-m", "app.worker"]
    restart: "no"
    env_file:
      - ../.env
    environment:
      REDIS_URL: redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy

volumes:
  redis-data:
